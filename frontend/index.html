<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkpoint 5.1 Review — Games API</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <main>
      <h1>Games API</h1>

    <script type="module" src="/src/main.js"></script>
